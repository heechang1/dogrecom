<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Vision OCR (DOCUMENT_TEXT_DETECTION)</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
      }
      p.note {
        font-size: 0.875rem;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Google Vision OCR</h1>
    <p class="note">
      <code>API_KEY</code>를 본인 키로 바꾼 뒤 이 파일을 브라우저에서 엽니다.
      브라우저에서 직접 호출 시 CORS로 막힐 수 있어, 그때는 서버 프록시가
      필요합니다. 키는 클라이언트에 두면 노출됩니다.
    </p>
    <label for="file">이미지 선택 (선택 시 자동 OCR)</label>
    <input id="file" type="file" accept="image/*" />

    <script>
      /** @type {string} Cloud Console에서 발급한 API 키 */
      const API_KEY = "YOUR_API_KEY_HERE";

      const VISION_URL =
        "https://vision.googleapis.com/v1/images:annotate";

      /**
       * @param {File} file
       * @returns {Promise<string>} 순수 base64 (data: 접두 없음)
       */
      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(reader.error ?? new Error("FileReader failed"));
          reader.onload = () => {
            const result = reader.result;
            if (typeof result !== "string") {
              reject(new Error("FileReader result is not a string"));
              return;
            }
            // data:image/...;base64, 제거 — OCR 본문이 아닌 data URL만 처리 (slice/substring 미사용)
            const base64 = result.replace(/^data:[^;]+;base64,/, "");
            resolve(base64);
          };
          reader.readAsDataURL(file);
        });
      }

      /**
       * @param {string} base64 순수 base64
       * @returns {Promise<string | null>} 전체 OCR 텍스트 (잘림 없음) 또는 없음
       */
      async function runOCR(base64) {
        const url = `${VISION_URL}?key=${encodeURIComponent(API_KEY)}`;
        const body = {
          requests: [
            {
              image: { content: base64 },
              features: [{ type: "DOCUMENT_TEXT_DETECTION" }],
            },
          ],
        };

        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const errBody = await res.text();
          throw new Error(`Vision API ${res.status}: ${errBody}`);
        }

        /** @type {unknown} */
        const data = await res.json();

        const responses =
          data &&
          typeof data === "object" &&
          "responses" in data &&
          Array.isArray(data.responses)
            ? data.responses
            : null;

        if (!responses || responses.length === 0) {
          return null;
        }

        const first = responses[0];
        if (!first || typeof first !== "object") {
          return null;
        }

        const fullTextAnnotation =
          "fullTextAnnotation" in first &&
          first.fullTextAnnotation &&
          typeof first.fullTextAnnotation === "object"
            ? first.fullTextAnnotation
            : null;

        if (!fullTextAnnotation) {
          return null;
        }

        const text =
          "text" in fullTextAnnotation &&
          typeof fullTextAnnotation.text === "string"
            ? fullTextAnnotation.text
            : null;

        // 구조화 계층(blocks)은 Next 앱에서 @/lib/google-vision-structured-ocr.ts 로 파싱 권장.
        // 평면 text만 쓰면 표 레이아웃에서 앞부분 누락이 날 수 있음.
        if (fullTextAnnotation.pages && fullTextAnnotation.pages.length > 0) {
          console.log(
            "[OCR] fullTextAnnotation.pages[0].blocks length:",
            fullTextAnnotation.pages[0].blocks &&
              fullTextAnnotation.pages[0].blocks.length
          );
        }

        return text;
      }

      /**
       * @param {Event} event
       */
      async function handleFileUpload(event) {
        const input = event.target;
        if (!(input instanceof HTMLInputElement) || !input.files) {
          return;
        }
        const file = input.files[0];
        if (!file) {
          return;
        }

        try {
          const base64 = await toBase64(file);
          const text = await runOCR(base64);

          if (text === null) {
            console.log("[OCR] 응답에 텍스트 없음 (fullTextAnnotation.text 없음)");
            return;
          }

          console.log("[OCR] 전체 텍스트:", text);
          console.log("[OCR] text.length:", text.length);
        } catch (err) {
          console.error("[OCR] 오류:", err);
        }
      }

      document.getElementById("file")?.addEventListener("change", handleFileUpload);
    </script>
  </body>
</html>
